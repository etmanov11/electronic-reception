services:
  - type: web
    name: electronic-reception
    env: python
    region: frankfurt
    plan: free
    pythonVersion: "3.12"
    buildCommand: "pip install -r requirements.txt && python manage.py collectstatic --noinput"
    startCommand: "python manage.py migrate --noinput && python manage.py bootstrap_data || true && gunicorn config.wsgi --bind 0.0.0.0:$PORT --workers 3"
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_SUPERUSER_USERNAME
        value: "admin"
      - key: DJANGO_SUPERUSER_EMAIL
        value: "admin@example.com"
      - key: DJANGO_SUPERUSER_PASSWORD
        generateValue: true
    healthCheckPath: /

databases:
  - name: electronic-reception-db
    databaseName: electronic_reception
    user: electronic_reception
    plan: free
    region: frankfurt

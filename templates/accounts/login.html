{% extends 'base.html' %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0">Авторизация</h4>
            </div>
            <div class="card-body p-4">
                <form method="post" novalidate>
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="id_username" class="form-label">Логин</label>
                        <input type="text" name="username" id="id_username" class="form-control" required autofocus aria-describedby="usernameHelp">
                    </div>
                    <div class="mb-3">
                        <label for="id_password" class="form-label">Пароль</label>
                        <input type="password" name="password" id="id_password" class="form-control" required>
                    </div>
                    {% if form.errors %}
                    <div class="alert alert-danger" role="alert">
                        Неверный логин или пароль. Проверьте раскладку клавиатуры.
                    </div>
                    {% endif %}
                    <button type="submit" class="btn btn-primary w-100">Войти</button>
                </form>
                <div class="mt-3 text-center">
                    <small class="text-muted">Доступ только для авторизованных сотрудников и граждан.</small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

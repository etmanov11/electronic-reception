{% extends 'base.html' %}
{% block title %}Смена пароля{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-5">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">Изменение пароля</div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small">{{ field.errors|striptags }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-warning text-dark w-100">Обновить пароль</button>
                </form>
                <a href="{% url 'core:profile' %}" class="btn btn-link d-block text-center mt-2">Вернуться в профиль</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
